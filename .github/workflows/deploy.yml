name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build static site
        run: |
          npm run build || true
          npm run export || true
          # 确保dist目录存在
          mkdir -p dist
          ls -la dist/ || echo "dist目录为空"
      
      - name: Deploy to Tencent Cloud
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          source: "dist/"
          target: "/var/www/wisdomdance-ai/"
          strip_components: 1
          rm: true
      
      - name: Notify deployment success
        run: |
          echo "🚀 Deployed to https://wisdomdance.ai"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date)"
