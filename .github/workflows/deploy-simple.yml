name: Deploy to Tencent Cloud (Simple)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build static site
        run: |
          # 创建静态HTML文件（临时方案，直到Next.js构建正常工作）
          mkdir -p dist
          cat > dist/index.html << 'HTMLEOF'
